<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Overview - Strip Grid</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0d0d0d
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #8fd
        }

        ;

        .status-badge {
            margin-left: auto;
            padding: 6px 10px;
            border-radius: 6px;
            background: #333;
            color: #ddd
        }

        .overview-grid {
            display: grid;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box
        }

        /* Target 3x3 on large screens */
        @media(min-width:1400px) {
            .overview-grid {
                grid-template-columns: repeat(3, 1fr)
            }
        }

        @media(min-width:900px) and (max-width:1399px) {
            .overview-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:899px) {
            .overview-grid {
                grid-template-columns: repeat(1, 1fr)
            }
        }

        .tile {
            background: #000;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column
        }

        /* iframe tiles: no padding, no aspect-ratio – JS sets height only */
        .tile.iframe-tile {
            padding: 0;
            aspect-ratio: unset;
        }

        .tile.offline {
            opacity: 0.4
        }

        .tile .head {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .tile .piste-id {
            font-weight: bold;
            color: #9fd
        }

        /* match main display colours and elements (scaled down) */
        .lName {
            background: #900;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px
        }

        .rName {
            background: #060;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px
        }

        .smName {
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        .smScore {
            font-size: 28px;
            font-weight: 700
        }

        .smClock {
            font-size: 14px
        }

        .smPeriod {
            font-size: 12px
        }

        .left-priority,
        .right-priority {
            font-size: 12px;
            display: none
        }

        .card-row {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .smCard {
            width: 26px;
            height: 14px;
            border-radius: 3px;
            display: none
        }

        .smPCard {
            padding: 2px 4px;
            border-radius: 3px;
            display: none
        }

        .smYellow {
            background: #ff0
        }

        .smRed {
            background: #f00
        }

        .flag.small {
            width: 34px;
            height: 22px
        }

        .fencer-photo {
            width: 64px;
            height: 80px;
            display: none
        }

        .smLamp {
            width: 18px;
            height: 8px;
            border-radius: 3px;
            background: #333
        }

        .lColor {
            background: #900
        }

        .rColor {
            background: #060
        }

        .lWhite,
        .rWhite {
            background: #ddd
        }

        .uw2f-red {
            color: #f00
        }

        .uw2f-green {
            color: #0f0
        }

        .uw2f-orange {
            color: #ffa500
        }

        .tile .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44
        }

        .tile .online-dot.online {
            background: #4caf50
        }

        .tile .names {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px
        }

        .tile .name {
            width: 48%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: calc(2.5vmin + 2px)
        }

        .tile .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px
        }

        .tile .score {
            font-size: calc(6vmin + 6px);
            font-weight: 700
        }

        .tile .clock {
            font-size: calc(3vmin + 2px)
        }

        .lights {
            display: flex;
            gap: 6px;
            margin-top: 8px
        }

        .light {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #222;
            box-shadow: none
        }

        .light.on {
            box-shadow: 0 0 8px currentColor
        }

        .light.red {
            background: #550000;
            color: #f00
        }

        .light.green {
            background: #003300;
            color: #0f0
        }

        .light.white {
            background: #ddd;
            color: #fff
        }

        .flag {
            width: 36px;
            height: 24px;
            object-fit: cover;
            border: 1px solid #222;
            display: none
        }

        /* small versions of the main display elements so tiles match /piste */
        .flag.small {
            width: 40px;
            height: 26px
        }

        /* ensure .national-flag (inherited from index.html) is constrained in overview tiles */
        .national-flag.small {
            width: 40px !important;
            height: 26px !important;
            max-width: 40px;
            max-height: 26px;
            object-fit: contain;
            display: inline-block;
        }

        .fencer-photo {
            width: 80px;
            height: 100px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            display: none
        }

        .fencer-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .poolNum {
            display: none
        }

        .uw2f-timer {
            font-size: 12px
        }

        .p-ct {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: auto
        }

        .p-card {
            padding: 4px 6px;
            border-radius: 4px;
            background: #444;
            color: #fff;
            font-weight: bold;
            display: none
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Strips Overview</h1>
        <a href="/" style="color:#9fd;text-decoration:none;margin-left:auto">← Display</a>
    </div>

    <div class="overview-grid" id="grid"></div>

    <script>
        // iframe-only overview: create 9 scaled iframes of /piste/NNN by default
        const MAX_TILES = 9;
        const grid = document.getElementById('grid');
        const tiles = {}; // id -> {el, iframe}
        const recentOrder = [];

        function pad(n) { return String(n).padStart(3, '0'); }

        function createIframeTile(id) {
            id = pad(id);
            if (tiles[id]) return tiles[id];

            const wrapper = document.createElement('div');
            wrapper.className = 'tile iframe-tile';
            wrapper.id = 'tile_' + id;
            wrapper.style.position = 'relative';
            wrapper.style.overflow = 'hidden';
            wrapper.style.cursor = 'pointer';

            const iframe = document.createElement('iframe');
            iframe.src = `/piste/${id}`;
            iframe.setAttribute('frameborder', '0');
            iframe.style.width = '1920px';
            iframe.style.height = '1080px';
            iframe.style.border = '0';
            iframe.style.transformOrigin = '0 0';
            iframe.style.display = 'block';

            wrapper.addEventListener('click', () => window.open(`/piste/${id}`, '_blank'));
            wrapper.appendChild(iframe);

            if (recentOrder.length >= MAX_TILES) {
                const oldest = recentOrder.shift();
                const node = document.getElementById('tile_' + oldest);
                if (node) node.remove();
                delete tiles[oldest];
            }

            grid.prepend(wrapper);
            recentOrder.push(id);
            tiles[id] = { el: wrapper, iframe };
            return tiles[id];
        }

        function updateTileScale(id) {
            const t = tiles[id]; if (!t) return;
            const wrapper = t.el;
            // offsetWidth gives CSS-grid-assigned width; don't set wrapper width from JS
            const w = wrapper.offsetWidth;
            if (!w) return;
            const scale = w / 1920;
            t.iframe.style.transform = `scale(${scale})`;
            // only set height so the tile row has the right size
            wrapper.style.height = Math.round(1080 * scale) + 'px';
        }

        function rescaleAll() {
            Object.keys(tiles).forEach(updateTileScale);
        }

        // create all 9 tiles first so the grid lays them out correctly
        for (let i = 1; i <= MAX_TILES; i++) createIframeTile(i);

        // double rAF: first tick lets DOM insert, second lets grid compute column widths
        requestAnimationFrame(() => requestAnimationFrame(rescaleAll));

        // keep scales up to date on resize
        window.addEventListener('resize', () => requestAnimationFrame(rescaleAll));
    </script>
</body>

</html>
