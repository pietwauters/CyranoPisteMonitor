<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Overview - Strip Grid</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0d0d0d
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #8fd
        }

        ;

        .status-badge {
            margin-left: auto;
            padding: 6px 10px;
            border-radius: 6px;
            background: #333;
            color: #ddd
        }

        .overview-grid {
            display: grid;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box
        }

        /* Target 3x3 on large screens */
        @media(min-width:1400px) {
            .overview-grid {
                grid-template-columns: repeat(3, 1fr)
            }
        }

        @media(min-width:900px) and (max-width:1399px) {
            .overview-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:899px) {
            .overview-grid {
                grid-template-columns: repeat(1, 1fr)
            }
        }

        .tile {
            background: #000;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column
        }

        .tile.offline {
            opacity: 0.4
        }

        .tile .head {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .tile .piste-id {
            font-weight: bold;
            color: #9fd
        }

        /* match main display colours and elements (scaled down) */
        .lName {
            background: #900;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px
        }

        .rName {
            background: #060;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px
        }

        .smName {
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        .smScore {
            font-size: 28px;
            font-weight: 700
        }

        .smClock {
            font-size: 14px
        }

        .smPeriod {
            font-size: 12px
        }

        .left-priority,
        .right-priority {
            font-size: 12px;
            display: none
        }

        .card-row {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .smCard {
            width: 26px;
            height: 14px;
            border-radius: 3px;
            display: none
        }

        .smPCard {
            padding: 2px 4px;
            border-radius: 3px;
            display: none
        }

        .smYellow {
            background: #ff0
        }

        .smRed {
            background: #f00
        }

        .flag.small {
            width: 34px;
            height: 22px
        }

        .fencer-photo {
            width: 64px;
            height: 80px;
            display: none
        }

        .smLamp {
            width: 18px;
            height: 8px;
            border-radius: 3px;
            background: #333
        }

        .lColor {
            background: #900
        }

        .rColor {
            background: #060
        }

        .lWhite,
        .rWhite {
            background: #ddd
        }

        .uw2f-red {
            color: #f00
        }

        .uw2f-green {
            color: #0f0
        }

        .uw2f-orange {
            color: #ffa500
        }

        .tile .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44
        }

        .tile .online-dot.online {
            background: #4caf50
        }

        .tile .names {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px
        }

        .tile .name {
            width: 48%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: calc(2.5vmin + 2px)
        }

        .tile .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px
        }

        .tile .score {
            font-size: calc(6vmin + 6px);
            font-weight: 700
        }

        .tile .clock {
            font-size: calc(3vmin + 2px)
        }

        .lights {
            display: flex;
            gap: 6px;
            margin-top: 8px
        }

        .light {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #222;
            box-shadow: none
        }

        .light.on {
            box-shadow: 0 0 8px currentColor
        }

        .light.red {
            background: #550000;
            color: #f00
        }

        .light.green {
            background: #003300;
            color: #0f0
        }

        .light.white {
            background: #ddd;
            color: #fff
        }

        .flag {
            width: 36px;
            height: 24px;
            object-fit: cover;
            border: 1px solid #222;
            display: none
        }

        /* small versions of the main display elements so tiles match /piste */
        .flag.small {
            width: 40px;
            height: 26px
        }

        .fencer-photo {
            width: 80px;
            height: 100px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            display: none
        }

        .fencer-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .poolNum {
            display: none
        }

        .uw2f-timer {
            font-size: 12px
        }

        .p-ct {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: auto
        }

        .p-card {
            padding: 4px 6px;
            border-radius: 4px;
            background: #444;
            color: #fff;
            font-weight: bold;
            display: none
        }
    </style>
    <script src="/js/mqttws31.min.js"></script>
</head>

<body>
    <div class="header">
        <h1>Strips Overview</h1>
        <div class="status-badge" id="mqtt-status">MQTT: disconnected</div>
        <a href="/" style="color:#9fd;text-decoration:none;margin-left:8px">← Display</a>
    </div>

    <div class="overview-grid" id="grid"></div>

    <script>
        // Keep an LRU of visible tiles (max 9)
        const MAX_TILES = 9;
        const grid = document.getElementById('grid');
        const mqttStatusEl = document.getElementById('mqtt-status');

        const useSSL = location.protocol === 'https:';
        const port = useSSL ? 9002 : 9001;
        const client = new Paho.MQTT.Client(location.hostname, port, "overview_" + Date.now());

        const tiles = {}; // id -> {el, lastSeen, data}
        const recentOrder = [];

        function pad(id) { return String(id).padStart(3, '0') }

        function ensureTile(id) {
            id = pad(id);
            if (tiles[id]) return tiles[id];
            // Create tile DOM
            const el = document.createElement('div'); el.className = 'tile'; el.id = 'tile_' + id;
            el.innerHTML = `
                                <div class="head"><div class="piste-id">Strip_${id}</div><div style="flex:1"></div><div class="online-dot" id="dot_${id}"></div></div>
                                <div class="names"><div class="lName smName" id="left_${id}"></div><div class="rName smName" id="right_${id}"></div></div>

                                <div class="top-row" style="margin-top:6px">
                                    <div class="left-lights" style="display:flex;gap:6px;align-items:center">
                                        <div class="lColor smLamp" id="lcol_${id}"></div>
                                        <div class="lWhite smLamp" id="lwh_${id}"></div>
                                    </div>
                                    <div style="flex:0 0 auto;text-align:center"><div class="poolNum">Strip_${id}</div></div>
                                    <div class="right-lights" style="display:flex;gap:6px;align-items:center">
                                        <div class="rWhite smLamp" id="rwh_${id}"></div>
                                        <div class="rColor smLamp" id="rcol_${id}"></div>
                                    </div>
                                </div>

                                <div id="strip_${id}" class="scoringMachine" style="margin-top:6px;flex:1;display:flex;flex-direction:column">
                                    <div class="scoring-inner" style="flex:1;">
                                        <div class="flag-container">
                                            <img class="national-flag left-flag small" id="lf_${id}" alt="Left">
                                            <img class="national-flag right-flag small" id="rf_${id}" alt="Right">
                                        </div>

                                        <div style="display:flex;gap:10px;align-items:center;justify-content:center;margin-top:6px">
                                            <div class="fencer-photo left-photo" id="leftphoto_${id}"><img id="leftimg_${id}" alt="Left"></div>
                                            <div style="flex:1"></div>
                                            <div class="fencer-photo right-photo" id="rightphoto_${id}"><img id="rightimg_${id}" alt="Right"></div>
                                        </div>

                                        <div class="timer-container" style="text-align:center;margin-top:6px">
                                            <div class="clock smClock" id="clk_${id}">0:00</div>
                                            <div class="period smPeriod" id="prd_${id}">1</div>
                                            <div id="uw2f_${id}" class="uw2f-timer" style="display:none"></div>
                                            <div class="left-priority" id="lpref_${id}" style="display:none"></div>
                                            <div class="right-priority" id="rpref_${id}" style="display:none"></div>
                                        </div>

                                        <div class="card-container" style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                                            <div style="display:flex;gap:6px;align-items:center">
                                                <div class="lPCard smCard smPCard" id="lPCard_${id}">P</div>
                                                <div class="lRed smCard" id="lRed_${id}"></div>
                                                <div class="lYellow smCard" id="lYellow_${id}"></div>
                                            </div>
                                            <div style="display:flex;gap:6px;align-items:center">
                                                <div class="rYellow smCard" id="rYellow_${id}"></div>
                                                <div class="rRed smCard" id="rRed_${id}"></div>
                                                <div class="rPCard smCard smPCard" id="rPCard_${id}">P</div>
                                            </div>
                                        </div>

                                        <div class="score-container" style="margin-top:6px;display:flex;justify-content:space-between;align-items:center">
                                            <div class="lScore smScore" id="lsc_${id}">0</div>
                                            <div style="flex:1"></div>
                                            <div class="rScore smScore" id="rsc_${id}">0</div>
                                        </div>
                                    </div>
                                </div>
                        `;

            // Manage grid size: if we have > MAX_TILES remove oldest
            if (recentOrder.length >= MAX_TILES) {
                const oldest = recentOrder.shift();
                const node = document.getElementById('tile_' + oldest);
                if (node) node.remove();
                delete tiles[oldest];
            }

            grid.prepend(el);
            recentOrder.push(id);
            tiles[id] = { el, lastSeen: Date.now(), data: {} };
            // try load existing fencer photos for this piste
            loadPhoto('left', id);
            loadPhoto('right', id);
            return tiles[id];
        }

        function setOnline(id, online) {
            const t = tiles[id]; if (!t) return;
            const dot = document.getElementById('dot_' + id);
            if (online) { t.el.classList.remove('offline'); dot.classList.add('online'); dot.title = 'online'; }
            else { t.el.classList.add('offline'); dot.classList.remove('online'); dot.title = 'offline'; }
        }

        function updateTileFromData(id, data) {
            const t = ensureTile(id);
            t.lastSeen = Date.now();
            // apply fields similarly to index.js
            if (data.hasOwnProperty('LeftName')) document.getElementById('left_' + pad(id)).textContent = data.LeftName || '';
            if (data.hasOwnProperty('RightName')) document.getElementById('right_' + pad(id)).textContent = data.RightName || '';
            if (data.hasOwnProperty('Lscore')) document.getElementById('lsc_' + pad(id)).textContent = String(data.Lscore);
            if (data.hasOwnProperty('Rscore')) document.getElementById('rsc_' + pad(id)).textContent = String(data.Rscore);
            if (data.hasOwnProperty('Stopwatch')) document.getElementById('clk_' + pad(id)).textContent = data.Stopwatch;
            if (data.hasOwnProperty('Round')) {
                const pr = document.getElementById('prd_' + pad(id));
                if (pr) pr.textContent = data.Round;
            }
            // P-cards
            if (data.hasOwnProperty('LP-card')) updatePCard('lPCard_' + pad(id), data['LP-card']);
            else updatePCard('lPCard_' + pad(id), 0);
            if (data.hasOwnProperty('RP-card')) updatePCard('rPCard_' + pad(id), data['RP-card']);
            else updatePCard('rPCard_' + pad(id), 0);

            // regular cards (yellow/red counts)
            if (data.hasOwnProperty('LYcard')) updateCardElement('lYellow_' + pad(id), data.LYcard);
            else updateCardElement('lYellow_' + pad(id), 0);
            if (data.hasOwnProperty('LRcard')) updateCardElement('lRed_' + pad(id), data.LRcard);
            else updateCardElement('lRed_' + pad(id), 0);
            if (data.hasOwnProperty('RYcard')) updateCardElement('rYellow_' + pad(id), data.RYcard);
            else updateCardElement('rYellow_' + pad(id), 0);
            if (data.hasOwnProperty('RRcard')) updateCardElement('rRed_' + pad(id), data.RRcard);
            else updateCardElement('rRed_' + pad(id), 0);
            // lights
            if (data.hasOwnProperty('LLight')) toggleLight('lcol_', id, data.LLight);
            if (data.hasOwnProperty('RLight')) toggleLight('rcol_', id, data.RLight);
            if (data.hasOwnProperty('LWlight')) toggleLight('lwh_', id, data.LWlight);
            if (data.hasOwnProperty('RWlight')) toggleLight('rwh_', id, data.RWlight);
            // flags
            if (data.hasOwnProperty('LeftNat')) updateFlag('lf_', id, data.LeftNat);
            if (data.hasOwnProperty('RightNat')) updateFlag('rf_', id, data.RightNat);

            // Priority and UW2F timer
            updatePriorityAndUW2F(id, data);
            // mark online because we received fresh data
            setOnline(pad(id), true);
        }

        function toggleLight(prefix, id, state) {
            const el = document.getElementById(prefix + pad(id));
            if (!el) return;
            if (String(state) === '1') { el.classList.add('on'); } else { el.classList.remove('on'); }
        }

        function updateFlag(prefix, id, noc) {
            const el = document.getElementById(prefix + pad(id));
            if (!el) return;
            if (noc && noc.length === 3) { el.src = `/flags/${noc.toUpperCase()}.png?t=${Date.now()}`; el.style.display = 'inline-block'; el.onerror = () => { el.style.display = 'none'; el.src = '' } }
            else { el.style.display = 'none'; el.src = ''; }
        }

        function updateCardElement(elId, value) {
            const el = document.getElementById(elId);
            if (!el) return;
            const num = parseInt(value);
            if (!isNaN(num) && num > 0) {
                el.textContent = num;
                el.style.display = 'inline-block';
            } else {
                el.textContent = '';
                el.style.display = 'none';
            }
        }

        function updatePCard(elId, value) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.classList.remove('smYellow', 'smRed');
            const num = parseInt(value);
            if (num === 1) { el.classList.add('smYellow'); el.style.display = 'inline-flex'; }
            else if (num === 2) { el.classList.add('smRed'); el.style.display = 'inline-flex'; }
            else { el.style.display = 'none'; }
        }

        function updatePriorityAndUW2F(id, data) {
            // Priority
            const lp = document.getElementById('lpref_' + pad(id));
            const rp = document.getElementById('rpref_' + pad(id));
            if (lp) { lp.style.display = 'none'; lp.textContent = ''; }
            if (rp) { rp.style.display = 'none'; rp.textContent = ''; }
            if (data.hasOwnProperty('Priority')) {
                const pr = data.Priority || '';
                if (pr === 'L' && lp) { lp.textContent = 'P'; lp.style.display = 'block'; }
                else if (pr === 'R' && rp) { rp.textContent = 'P'; rp.style.display = 'block'; }
            }

            // UW2F timer handling (if present)
            const uwEl = document.getElementById('uw2f_' + pad(id));
            if (!uwEl) return;
            if (data.hasOwnProperty('UW2F_Timer')) {
                const uw = data.UW2F_Timer;
                if (uw && uw.time) {
                    uwEl.textContent = String(uw.time);
                    // colour rules similar to main display
                    uwEl.classList.remove('uw2f-red', 'uw2f-green', 'uw2f-orange');
                    const parts = String(uw.time).split(':');
                    let minutes = 0, seconds = 0;
                    if (parts.length >= 2) { minutes = parseInt(parts[0]) || 0; seconds = parseInt(parts[1]) || 0; }
                    else { seconds = parseInt(parts[0]) || 0; }
                    const total = minutes * 60 + seconds;
                    if (total < 50) uwEl.classList.add('uw2f-green');
                    else if (total < 60) uwEl.classList.add('uw2f-orange');
                    else uwEl.classList.add('uw2f-red');
                    uwEl.style.display = 'block';
                } else {
                    uwEl.textContent = '';
                    uwEl.style.display = 'none';
                    uwEl.classList.remove('uw2f-red', 'uw2f-green', 'uw2f-orange');
                }
            }
        }

        // Load saved fencer photos from public/fencers/piste-<id>/<position>.<ext>
        function loadPhoto(position, pisteNumber) {
            const pid = pad(pisteNumber);
            const photoEl = document.getElementById(position + 'photo_' + pid);
            const imgEl = document.getElementById(position + 'img_' + pid);
            if (!photoEl || !imgEl) return;

            const extensions = ['jpg', 'jpeg', 'png', 'gif'];
            let idx = 0;

            function tryNext() {
                if (idx >= extensions.length) {
                    photoEl.style.display = 'none';
                    return;
                }
                const ext = extensions[idx++];
                const url = `/fencers/piste-${pid}/${position}.${ext}?t=${Date.now()}`;
                const tester = new Image();
                tester.onload = () => { imgEl.src = url; photoEl.style.display = 'block'; };
                tester.onerror = tryNext;
                tester.src = url;
            }

            tryNext();
        }

        client.onConnectionLost = (responseObject) => {
            console.error('MQTT connection lost', responseObject);
            const reason = responseObject && responseObject.errorMessage ? responseObject.errorMessage : '';
            mqttStatusEl.textContent = 'MQTT: disconnected' + (reason ? (': ' + reason) : '');
        };
        client.onMessageArrived = (message) => {
            const topic = message.destinationName;
            // Expect topics like MQTT_Cyrano/Piste_001/FromDevice ...
            const m = topic.match(/Piste_(\d{1,3})/i);
            if (!m) return;
            const id = pad(m[1]);
            // Try parse payload
            let payload = message.payloadString;
            let obj = {};
            try { obj = JSON.parse(payload); } catch (e) { /* ignore non-json */ }
            // If this looks like a Last Will indicator
            if (/lwt|lastwill|last-will/i.test(topic)) {
                // If payload contains offline-like text mark offline
                const p = payload.toLowerCase();
                if (p.includes('offline') || p.includes('0') || p.includes('false')) setOnline(id, false);
                else setOnline(id, true);
                return;
            }
            // Otherwise treat as normal data update
            updateTileFromData(id, obj);
        };

        function pad(n) { return String(n).padStart(3, '0') }

        mqttStatusEl.textContent = 'MQTT: connecting...';
        client.connect({
            useSSL: useSSL,
            onSuccess: () => {
                mqttStatusEl.textContent = 'MQTT: connected';
                // Subscribe to all piste topics under MQTT_Cyrano
                // Use '+' as a single-level wildcard (must occupy a whole level)
                client.subscribe('MQTT_Cyrano/+/#');
            },
            onFailure: (err) => {
                console.error('MQTT connect failed', err);
                const msg = err && err.errorMessage ? err.errorMessage : JSON.stringify(err);
                mqttStatusEl.textContent = 'MQTT: connect failed: ' + msg;
            }
        });

        // Periodic scan to mark offline if no recent messages
        setInterval(() => {
            const now = Date.now();
            Object.keys(tiles).forEach(id => {
                const t = tiles[id]; if (!t) return;
                if (now - t.lastSeen > 30000) { // 30s
                    setOnline(id, false);
                }
            });
        }, 5000);
    </script>
</body>

</html>
