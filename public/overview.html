<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Overview - Strip Grid</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0d0d0d
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #8fd
        }

        #fullscreen-btn {
            margin-left: auto;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        #fullscreen-btn:hover {
            background: #444;
        }

        .overview-grid {
            display: grid;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
            /* column count and widths are set entirely by JS rescaleAll().
               JS uses document.documentElement.clientWidth so no CSS media
               query is needed — this fallback is just for first paint. */
            grid-template-columns: repeat(3, 1fr);
        }

        /*
         * iframe tile layout — the key to correct scaling:
         *
         * The iframe is declared 1920×1080 px. We scale it down with
         * CSS transform: scale(s) where s = colWidth / 1920.
         * transform does NOT affect layout, so the iframe still occupies
         * 1920×1080 in the document flow and overflows the wrapper.
         * overflow:hidden clips it to the visible tile area.
         *
         * CRITICAL: the wrapper must be display:block (not flex).
         * A flex container applies flex-shrink to its children, which
         * would collapse the iframe's layout height from 1080px to the
         * tile's visual height (~288px). That makes 1vh inside the iframe
         * resolve to ~2.9px instead of 10.8px, breaking all vh-based
         * sizing inside index.html.
         *
         * JS sets wrapper width and height to colWidth × (1080/1920*colWidth)
         * so the grid rows are the right visual size.
         */
        .tile.iframe-tile {
            display: block;
            padding: 0;
            aspect-ratio: unset;
            min-width: 0;
            overflow: hidden;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Strips Overview</h1>
        <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        <a href="/" style="color:#9fd;text-decoration:none;margin-left:8px">← Display</a>
    </div>

    <div class="overview-grid" id="grid"></div>

    <script src="/js/mqttws31.min.js"></script>
    <script>
        const params = new URLSearchParams(location.search);

        // ?pistes=1,2,5  → manual mode: show exactly these pistes, no MQTT
        // (nothing)       → MQTT auto-discovery via Connection topic
        // ?tiles=N        → cap maximum tiles in MQTT mode (default 32)
        // ?cols=N         → fixed-column mode: tile size is fixed to viewport width / N,
        //                   extra rows scroll; no fullscreen button
        const pisteParam = params.get('pistes');
        const MANUAL_MODE = !!pisteParam;
        const MAX_CAP = Math.max(1, parseInt(params.get('tiles')) || 32);
        const colsParam = params.get('cols');
        const COL_MODE = !!colsParam;
        const MAX_COLS = Math.max(1, parseInt(colsParam) || 4);

        // Hide fullscreen button in col mode (tiles scroll, fullscreen adds nothing)
        if (COL_MODE) document.getElementById('fullscreen-btn').style.display = 'none';

        const grid = document.getElementById('grid');
        const tiles = {}; // padded-id -> { el, iframe }

        function pad(n) { return String(n).padStart(3, '0'); }

        function createIframeTile(id) {
            if (tiles[id]) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'tile iframe-tile';
            wrapper.id = 'tile_' + id;
            wrapper.style.position = 'relative';
            wrapper.style.overflow = 'hidden';
            wrapper.style.cursor = 'pointer';

            const iframe = document.createElement('iframe');
            iframe.src = `/piste/${id}?embed=1`;
            iframe.setAttribute('frameborder', '0');
            iframe.style.width = '1920px';
            iframe.style.height = '1080px';
            iframe.style.border = '0';
            iframe.style.flexShrink = '0'; // never let a flex parent collapse the height
            iframe.style.transformOrigin = '0 0';
            iframe.style.display = 'block';

            // Transparent overlay to capture clicks — iframes swallow mouse events
            // so a click listener on the wrapper never fires without this.
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:absolute;inset:0;z-index:1;cursor:pointer;';
            overlay.addEventListener('click', () => window.open(`/piste/${id}`, '_blank'));

            wrapper.appendChild(iframe);
            wrapper.appendChild(overlay);
            tiles[id] = { el: wrapper, iframe };
        }

        function rebuildGrid() {
            // Re-append all tiles in sorted (numerical) order
            Object.keys(tiles).sort().forEach(id => grid.appendChild(tiles[id].el));
            rescaleAll();
        }

        function addPiste(rawId) {
            const id = pad(rawId);
            if (tiles[id]) return;
            if (Object.keys(tiles).length >= MAX_CAP) return;
            createIframeTile(id);
            rebuildGrid();
        }

        function removePiste(rawId) {
            const id = pad(rawId);
            if (!tiles[id]) return;
            tiles[id].el.remove();
            delete tiles[id];
            rebuildGrid();
        }

        function rescaleAll() {
            const count = Object.keys(tiles).length;
            if (count === 0) return;
            const viewW = document.documentElement.clientWidth;
            const viewH = document.documentElement.clientHeight;

            if (COL_MODE) {
                // Fixed-column mode: tile width is always viewW / MAX_COLS.
                // Extra rows overflow the page → vertical scrollbar.
                const cols = Math.min(count, MAX_COLS);
                const padding = 12, gap = 12;
                const colW = Math.floor((viewW - 2 * padding - (cols - 1) * gap) / cols);
                if (colW <= 0) return;
                const scale = colW / 1920;
                const tileH = Math.round(1080 * scale);
                grid.style.padding = padding + 'px';
                grid.style.gap = gap + 'px';
                grid.style.gridTemplateColumns = `repeat(${cols}, ${colW}px)`;
                Object.values(tiles).forEach(t => {
                    t.el.style.width = colW + 'px';
                    t.el.style.height = tileH + 'px';
                    t.iframe.style.transform = `scale(${scale})`;
                });
            } else {
                // Fit-all mode: scale everything so all tiles fit on one screen.
                // In fullscreen: also constrain by viewport height.
                const inFS = !!document.fullscreenElement;
                const cols = Math.ceil(Math.sqrt(count));
                const rows = Math.ceil(count / cols);
                const padding = inFS ? 0 : 12, gap = inFS ? 2 : 12;
                const colW = Math.floor((viewW - 2 * padding - (cols - 1) * gap) / cols);
                const rowH = Math.floor((viewH - 2 * padding - (rows - 1) * gap) / rows);
                const colWbyH = Math.floor(rowH * 1920 / 1080);
                const effectiveColW = inFS ? Math.min(colW, colWbyH) : colW;
                if (effectiveColW <= 0) return;
                const scale = effectiveColW / 1920;
                const tileH = Math.round(1080 * scale);
                grid.style.padding = padding + 'px';
                grid.style.gap = gap + 'px';
                grid.style.gridTemplateColumns = `repeat(${cols}, ${effectiveColW}px)`;
                Object.values(tiles).forEach(t => {
                    t.el.style.width = effectiveColW + 'px';
                    t.el.style.height = tileH + 'px';
                    t.iframe.style.transform = `scale(${scale})`;
                });
            }
        }

        if (MANUAL_MODE) {
            // Parse comma-separated list, e.g. ?pistes=1,2,5,007
            pisteParam.split(',')
                .map(s => parseInt(s.trim(), 10))
                .filter(n => !isNaN(n) && n > 0)
                .slice(0, MAX_CAP)
                .forEach(n => addPiste(n));
        } else {
            // MQTT auto-discovery:
            // Subscribe to MQTT_Cyrano/+/Connection.
            // The broker sends retained messages for every known piste on connect,
            // so the grid populates automatically without any manual configuration.
            // payload "offline" → remove tile;  anything else → add tile.
            const useSSL = location.protocol === 'https:';
            const port = useSSL ? 9002 : 9001;
            const client = new Paho.MQTT.Client(
                location.hostname, port, 'overview_' + Date.now());

            client.onMessageArrived = (msg) => {
                // topic format: MQTT_Cyrano/Piste_001/Connection
                const parts = msg.destinationName.split('/');
                if (parts.length < 3 || parts[2] !== 'Connection') return;
                const m = parts[1].match(/(\d+)$/);
                if (!m) return;
                const num = parseInt(m[1], 10);
                if (msg.payloadString.trim().toLowerCase() === 'offline') {
                    removePiste(num);
                } else {
                    addPiste(num);
                }
            };

            client.connect({
                useSSL,
                onSuccess: () => client.subscribe('MQTT_Cyrano/+/Connection'),
                onFailure: (err) => console.error('MQTT connect failed:', err)
            });
        }

        rescaleAll();
        new ResizeObserver(rescaleAll).observe(document.documentElement);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const inFS = !!document.fullscreenElement;
            document.querySelector('.header').style.display = inFS ? 'none' : 'flex';
            rescaleAll();
        });
    </script>
</body>

</html>
