<!DOCTYPE html>
<html>

<head>
  <title>Fencing Score Display</title>
  <style>
    /* Fullscreen styles */
    /* Fullscreen overrides */
    :root {
      /* frame thickness used for all coloured frames */
      --frame-thickness: 0.8vmin;
    }

    :fullscreen {
      background: #000 !important;
    }

    :fullscreen .scoring-container {
      width: 100vw !important;
      height: 100vh !important;
      min-width: unset !important;
      min-height: unset !important;
      max-width: unset !important;
      max-height: unset !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }

    :fullscreen #fullscreen-btn,
    :fullscreen #piste-select {
      display: none;
    }

    :fullscreen .scoring-container {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      padding: 2vmin;
    }

    html:fullscreen,
    body:fullscreen {
      overflow: hidden;
    }

    /* Base styles */
    body {
      background: #333;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Main container */
    .scoring-container {
      background: #000;
      border-radius: 1.5vmin;
      position: relative;
      width: 90vw;
      height: 90vh;
      min-width: 800px;
      min-height: 400px;
      max-width: 2000px;
      max-height: 1000px;
      padding: 2vmin;
      box-sizing: border-box;
      aspect-ratio: 16/9;
      display: flex;
      flex-direction: column;
    }

    /* Typography */
    h3 {
      color: #fff;
      margin: 0 0 1vh;
      font-size: 3vmin;
      text-align: center;
    }

    h4.poolNum {
      color: #ff0;
      margin: 0 0 2vh;
      font-size: 2.5vmin;
      text-align: center;
    }

    /* Scoring machine layout */
    .scoringMachine {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      display: block;
    }

    /* Name containers */
    .name-container {
      display: flex;
      justify-content: space-between;
      height: 10vh;
      margin: 0 0 1vh 0;
      width: calc(100% + 4vmin);
      margin-left: -2vmin;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1vmin;
      width: 100%;
    }

    /* Centering inner scoring area so the machine sits in the middle */
    .scoring-inner {
      position: relative;
      width: 100%;
      max-width: 1400px;
      height: 100%;
      margin: 0 auto;
    }

    /* Layout for top-row: left lights, centered pool name, right lights */
    .top-row .left-lights,
    .top-row .right-lights {
      display: flex;
      gap: 1vmin;
      align-items: center;
      flex: 1 1 auto;
    }

    .top-row .left-lights {
      justify-content: flex-start;
    }

    .top-row .right-lights {
      justify-content: flex-end;
    }

    .top-row h4.poolNum {
      flex: 0 0 auto;
      margin: 0 1vmin;
      white-space: nowrap;
      text-align: center;
    }

    .smName {
      color: white;
      font-size: 8vmin;
      width: 50%;
      box-sizing: border-box;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 1.5vmin;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .name-text {
      flex-grow: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lName {
      background: #900;
      justify-content: flex-start;
    }

    .rName {
      background: #060;
      justify-content: flex-end;
    }

    /* Add flag container styling */
    .flag-container {
      display: flex;
      justify-content: space-between;
      padding: 0 0.5vmin;
      margin: 1vmin 0;
      height: 10vmin;
    }

    .national-flag {
      height: 10vmin;
      width: auto;
      aspect-ratio: 3/2;
      object-fit: contain;
      display: none;
    }

    /* Fencer photos */
    .fencer-photos {
      display: flex;
      justify-content: center;
      gap: 55vmin;
      padding: 0;
      margin: 3vmin 0;
      height: 35vmin;
    }

    .fencer-photo {
      width: 28vmin;
      height: 35vmin;
      border-radius: 1vmin;
      overflow: hidden;
      background: #222;
      border: 0.3vmin solid #444;
      display: none;
    }

    .fencer-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fencer-photo.visible {
      display: block;
    }

    /* Lights */
    .light-container {
      display: flex;
      justify-content: space-between;
      margin: 1vh 0;
      padding: 0 1px;
    }

    .smLamp {
      width: 24vmin;
      height: 6vmin;
      transition: all 0.3s ease;
    }

    /* Timer */
    .timer-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .smClock {
      color: #fff;
      font-size: 15vmin;
      margin: 5;
      text-shadow: 0 0 25px #fff;
    }

    .smPeriod {
      color: #fff;
      font-size: 6vmin;
      margin-top: 1vh;
    }

    /* Cards */
    .card-container {
      position: absolute;
      bottom: 4vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .smCard {
      width: 6vmin;
      height: 4.5vmin;
      border-radius: 0.5vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      visibility: hidden;
      position: absolute;
    }

    /* Position cards relative to center */
    .lYellow {
      right: calc(50% + 12vmin);
      /* center + 2 card widths */
    }

    .lRed {
      right: calc(50% + 21vmin);
      /* Yellow + 1 card width + 0.5 card gap */
    }

    .rYellow {
      left: calc(50% + 12vmin);
      /* center + 2 card widths */
    }

    .rRed {
      left: calc(50% + 21vmin);
      /* Yellow + 1 card width + 0.5 card gap */
    }

    .lPCard {
      right: calc(50% + 30vmin);
      /* Red + 1 card width + 0.5 card gap */
    }

    .rPCard {
      left: calc(50% + 30vmin);
      /* Red + 1 card width + 0.5 card gap */
    }

    .smPCard {
      font-weight: bold;
      font-size: 3vmin;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Scores */
    .score-container {
      position: absolute;
      bottom: 2vh;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 4vmin;
      box-sizing: border-box;
    }

    .smScore {
      color: white;
      font-size: 18vmin;
      min-width: 25vmin;
      text-align: center;
    }

    /* Priority indicators */
    .left-priority,
    .right-priority {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 5vmin;
      display: none;
    }

    .left-priority {
      right: calc(100% + 1.5vmin);
      color: #ff0000;
    }

    .right-priority {
      left: calc(100% + 1.5vmin);
      color: #00ff00;
    }

    /* Fullscreen button */
    #fullscreen-btn {
      position: fixed;
      top: 2vmin;
      right: 2vmin;
      z-index: 1000;
      padding: 1vmin 2vmin;
      font-size: 2vmin;
      background: #444;
      color: white;
      border: 1px solid #666;
      border-radius: 0.5vmin;
      cursor: pointer;
    }

    /* Piste selector */
    #piste-select {
      position: absolute;
      top: 2vmin;
      left: 2vmin;
      z-index: 100;
      padding: 0.5vmin 1vmin;
      font-size: 2vmin;
    }

    /* Color classes */
    .smYellow {
      background: #ff0;
    }

    .smRed {
      background: #f00;
    }

    .smGreen {
      background: #0f0;
    }

    .smWhite {
      background: #fff;
    }

    .uw2f-timer {
      font-size: 8vmin;
      /* match .smPeriod */
      margin-top: 3vh;
      /* slightly lower */
      line-height: 1;
    }

    .uw2f-red {
      color: #f00;
    }

    .uw2f-green {
      color: #0f0;
    }

    .uw2f-orange {
      color: #ffa500;
    }

    /* Fullscreen frame colours (thin overlay above all content) */
    .scoring-container.frame-red::after,
    .scoring-container.frame-green::after,
    .scoring-container.frame-yellow::after,
    .scoring-container.frame-blue::after,
    .scoring-container.frame-gold::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      border-radius: inherit;
    }

    .scoring-container.frame-red::after {
      box-shadow: inset 0 0 0 var(--frame-thickness) #ff0000;
    }

    .scoring-container.frame-green::after {
      box-shadow: inset 0 0 0 var(--frame-thickness) #00ff00;
    }

    .scoring-container.frame-yellow::after {
      box-shadow: inset 0 0 0 var(--frame-thickness) #ff0;
    }

    .scoring-container.frame-blue::after {
      box-shadow: inset 0 0 0 var(--frame-thickness) #00f;
    }

    .scoring-container.frame-gold::after {
      box-shadow: inset 0 0 0 var(--frame-thickness) #d4af37;
    }
  </style>
</head>

<body>
  <button id="fullscreen-btn">Fullscreen</button>
  <select id="piste-select">
    <option value="">Select Piste</option>
  </select>

  <div class="scoring-container">
    <div class="name-container">
      <div class="lName smName"></div>
      <div class="rName smName"></div>
    </div>

    <div class="top-row">
      <div class="left-lights">
        <div class="lColor smLamp smRed"></div>
        <div class="lWhite smLamp smWhite"></div>
      </div>
      <h4 class="poolNum">Strip Podium</h4>
      <div class="right-lights">
        <div class="rWhite smLamp smWhite"></div>
        <div class="rColor smLamp smGreen"></div>
      </div>
    </div>

    <div id="strip_Podium" class="scoringMachine">
      <div class="scoring-inner">
        <div class="flag-container">
          <img class="national-flag left-flag" alt="Left flag">
          <img class="national-flag right-flag" alt="Right flag">
        </div>

        <div class="fencer-photos">
          <div class="fencer-photo left-photo">
            <img alt="Left fencer">
          </div>
          <div class="fencer-photo right-photo">
            <img alt="Right fencer">
          </div>
        </div>

        <div class="timer-container">
          <div class="clock smClock">0:00</div>
          <div class="period smPeriod">1</div>
          <div id="uw2f-timer" class="uw2f-timer" style="display:none"></div>
          <div class="left-priority"></div>
          <div class="right-priority"></div>
        </div>

        <div class="card-container">
          <div class="lPCard smCard smPCard">P</div>
          <div class="lRed smCard smRed"></div>
          <div class="lYellow smCard smYellow"></div>
          <div class="rYellow smCard smYellow"></div>
          <div class="rRed smCard smRed"></div>
          <div class="rPCard smCard smPCard">P</div>
        </div>

        <div class="score-container">
          <div class="lScore smScore">0</div>
          <div class="rScore smScore">0</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/mqttws31.min.js"></script>
  <script>
    let currentPiste = "";
    // Last displayed raw Piste value from incoming messages (cosmetic only)
    let displayedPiste = "";
    // Use wss:// (secure websocket) when page is loaded via https://
    const useSSL = location.protocol === 'https:';
    const port = useSSL ? 9002 : 9001;  // Use port 9002 for wss, 9001 for ws
    const client = new Paho.MQTT.Client(location.hostname, port, "fencingDisplay_" + Date.now());

    // Check if loaded via direct piste URL
    function getPisteFromURL() {
      const path = window.location.pathname;
      const match = path.match(/\/piste\/(\d{3})/);
      return match ? match[1] : null;
    }

    // Set up message handler before connecting
    client.onMessageArrived = (message) => {
      if (message.destinationName.includes("/FromDevice")) {
        try {
          const data = JSON.parse(message.payloadString);
          // If this is the new EFP2 protocol, only apply the UW2F_Timer part
          if (data.Protocol && data.Protocol === 'EFP2') {
            updateDisplay({ UW2F_Timer: data.UW2F_Timer });
          } else {
            updateDisplay(data);
          }
        } catch (e) {
          console.error("JSON parse error:", e);
        }
      }
    };
    // Helper to normalise piste IDs to 3 digits for display (cosmetic only)
    function padPisteId(id) {
      if (id == null) return '';
      const s = String(id).trim();
      if (!s) return '';
      return /^\d+$/.test(s) ? s.padStart(3, '0') : s;
    }



    // Initialize piste selector
    window.onload = function () {
      const pisteSelect = document.getElementById('piste-select');
      const urlPiste = getPisteFromURL();

      // Populate selector options
      for (let i = 1; i <= 999; i++) {
        const option = document.createElement('option');
        option.value = i.toString().padStart(3, '0');
        option.text = `Piste ${option.value}`;
        pisteSelect.appendChild(option);
      }

      // If loaded via direct URL, hide controls and auto-subscribe
      if (urlPiste) {
        pisteSelect.style.display = 'none';
        document.getElementById('fullscreen-btn').style.top = '2vmin';
        document.getElementById('fullscreen-btn').style.left = '2vmin';

        // Auto-subscribe to the piste
        currentPiste = urlPiste;
        pisteSelect.value = urlPiste;
        client.connect({
          useSSL: useSSL,
          onSuccess: () => {
            client.subscribe(`MQTT_Cyrano/Piste_${currentPiste}/#`);
            document.querySelector('.poolNum').textContent = `Strip_${currentPiste}`;
            loadFencerPhotos();
          },
          onFailure: (err) => console.error("Connection failed:", err)
        });
      } else {
        // Normal mode - connect but wait for user to select piste
        client.connect({
          useSSL: useSSL,
          onSuccess: () => console.log("Connected to MQTT broker"),
          onFailure: (err) => console.error("Connection failed:", err)
        });
      }

      handleResize();
    };

    // Piste selection handler
    document.getElementById('piste-select').addEventListener('change', (e) => {
      const newPiste = e.target.value;
      if (newPiste && newPiste !== currentPiste) {
        if (currentPiste) {
          client.unsubscribe(`MQTT_Cyrano/Piste_${currentPiste}/#`);
        }
        currentPiste = newPiste;
        client.subscribe(`MQTT_Cyrano/Piste_${currentPiste}/#`);
        resetDisplay();
        document.querySelector('.poolNum').textContent = `Strip_${currentPiste}`;
        loadFencerPhotos();
      }
    });

    // Element references
    const elements = {
      leftName: document.querySelector('.lName'),
      rightName: document.querySelector('.rName'),
      leftScore: document.querySelector('.lScore'),
      rightScore: document.querySelector('.rScore'),
      clock: document.querySelector('.smClock'),
      period: document.querySelector('.smPeriod'),
      leftPriority: document.querySelector('.left-priority'),
      rightPriority: document.querySelector('.right-priority'),
      poolNum: document.querySelector('.poolNum'),
      cards: {
        lRed: document.querySelector('.lRed'),
        lYellow: document.querySelector('.lYellow'),
        rRed: document.querySelector('.rRed'),
        rYellow: document.querySelector('.rYellow'),
        lPCard: document.querySelector('.lPCard'),
        rPCard: document.querySelector('.rPCard')
      },
      lights: {
        lColor: document.querySelector('.lColor'),
        rColor: document.querySelector('.rColor'),
        lWhite: document.querySelector('.lWhite'),
        rWhite: document.querySelector('.rWhite')
      },
      leftFlag: document.querySelector('.left-flag'),
      rightFlag: document.querySelector('.right-flag'),
      leftPhoto: document.querySelector('.left-photo'),
      rightPhoto: document.querySelector('.right-photo'),
      leftPhotoImg: document.querySelector('.left-photo img'),
      rightPhotoImg: document.querySelector('.right-photo img')
      , uw2fTimer: document.getElementById('uw2f-timer')
    };

    client.onMessageArrived = (message) => {
      if (message.destinationName.includes("/FromDevice")) {
        try {
          const data = JSON.parse(message.payloadString);
          if (data.Protocol && data.Protocol === 'EFP2') {
            updateDisplay({ UW2F_Timer: data.UW2F_Timer });
          } else {
            updateDisplay(data);
          }
        } catch (e) {
          console.error("JSON parse error:", e);
        }
      }
    };
    function resetDisplay() {
      // Reset all display elements
      elements.leftName.textContent = "";
      elements.rightName.textContent = "";
      elements.leftScore.textContent = "0";
      elements.rightScore.textContent = "0";
      elements.clock.textContent = "0:00";
      elements.period.textContent = "1";
      elements.leftFlag.style.display = 'none';
      elements.leftFlag.style.display = 'none';
      elements.rightFlag.style.display = 'none';
      elements.leftFlag.src = '';
      elements.rightFlag.src = '';
      // Reset UW2F timer
      if (elements.uw2fTimer) {
        elements.uw2fTimer.textContent = '';
        elements.uw2fTimer.style.display = 'none';
        elements.uw2fTimer.classList.remove('uw2f-red', 'uw2f-green', 'uw2f-orange');
      }
      // Reset cards
      Object.values(elements.cards).forEach(card => {
        card.textContent = "";
        card.style.visibility = "hidden";
      });

      // Reset lights
      Object.values(elements.lights).forEach(light => {
        light.style.opacity = "0.1";
        light.style.boxShadow = "none";
      });
    }

    function updateDisplay(data) {
      // Cosmetic: if the incoming EFP1.1 JSON contains a `Piste` field,
      // show it on the header. This does NOT change subscriptions.
      if (data && data.hasOwnProperty('Piste')) {
        // store raw value for frame logic (case-insensitive substring match)
        displayedPiste = String(data.Piste || '').trim();
        const padded = padPisteId(displayedPiste);
        if (padded) elements.poolNum.textContent = `Strip_${padded}`;
        else elements.poolNum.textContent = displayedPiste || elements.poolNum.textContent;
        applyPisteFrame();
      }
      // Update only fields that are present to avoid flicker
      if (data.hasOwnProperty('LeftName')) elements.leftName.textContent = data.LeftName || "";
      if (data.hasOwnProperty('RightName')) elements.rightName.textContent = data.RightName || "";
      if (data.hasOwnProperty('Lscore')) elements.leftScore.textContent = String(data.Lscore);
      if (data.hasOwnProperty('Rscore')) elements.rightScore.textContent = String(data.Rscore);

      if (data.hasOwnProperty('Stopwatch')) elements.clock.textContent = data.Stopwatch || "0:00";
      if (data.hasOwnProperty('Round')) elements.period.textContent = data.Round || "1";

      // Update UW2F timer display only when field present
      if (elements.uw2fTimer && data.hasOwnProperty('UW2F_Timer')) {
        const uw = data.UW2F_Timer;
        if (uw && uw.time) {
          const timeStr = uw.time.toString();
          elements.uw2fTimer.textContent = timeStr;
          const parts = timeStr.split(':');
          let minutes = 0, seconds = 0;
          if (parts.length >= 2) {
            minutes = parseInt(parts[0], 10) || 0;
            seconds = parseInt(parts[1], 10) || 0;
          } else {
            seconds = parseInt(parts[0], 10) || 0;
          }
          const totalSeconds = minutes * 60 + seconds;
          // Clear any previous color classes
          elements.uw2fTimer.classList.remove('uw2f-red', 'uw2f-green', 'uw2f-orange');
          // Apply color rules: green <50s, orange 50-60s, red >60s
          if (totalSeconds < 50) {
            elements.uw2fTimer.classList.add('uw2f-green');
          } else if (totalSeconds < 60) {
            elements.uw2fTimer.classList.add('uw2f-orange');
          } else {
            elements.uw2fTimer.classList.add('uw2f-red');
          }
          elements.uw2fTimer.style.display = 'block';
        } else {
          elements.uw2fTimer.textContent = '';
          elements.uw2fTimer.style.display = 'none';
          elements.uw2fTimer.classList.remove('uw2f-red', 'uw2f-green', 'uw2f-orange');
        }
      }

      // Update cards only when values provided
      if (data.hasOwnProperty('LRcard')) updateCard(elements.cards.lRed, data.LRcard);
      if (data.hasOwnProperty('LYcard')) updateCard(elements.cards.lYellow, data.LYcard);
      if (data.hasOwnProperty('RRcard')) updateCard(elements.cards.rRed, data.RRcard);
      if (data.hasOwnProperty('RYcard')) updateCard(elements.cards.rYellow, data.RYcard);

      // Update P-Cards only when provided
      if (data.hasOwnProperty('LP-card')) updatePCard(elements.cards.lPCard, data['LP-card']);
      if (data.hasOwnProperty('RP-card')) updatePCard(elements.cards.rPCard, data['RP-card']);

      // Update lights only when provided
      if (data.hasOwnProperty('LLight')) updateLight(elements.lights.lColor, data.LLight);
      if (data.hasOwnProperty('RLight')) updateLight(elements.lights.rColor, data.RLight);
      if (data.hasOwnProperty('LWlight')) updateLight(elements.lights.lWhite, data.LWlight);
      if (data.hasOwnProperty('RWlight')) updateLight(elements.lights.rWhite, data.RWlight);

      // Priority only update when present
      if (data.hasOwnProperty('Priority')) {
        const priority = data.Priority || '';
        elements.leftPriority.style.display = 'none';
        elements.rightPriority.style.display = 'none';
        elements.leftPriority.textContent = '';
        elements.rightPriority.textContent = '';

        if (priority === 'L') {
          elements.leftPriority.textContent = 'P';
          elements.leftPriority.style.display = 'block';
        } else if (priority === 'R') {
          elements.rightPriority.textContent = 'P';
          elements.rightPriority.style.display = 'block';
        }
      }

      if (data.hasOwnProperty('LeftNat')) updateFlag(elements.leftFlag, data.LeftNat);
      if (data.hasOwnProperty('RightNat')) updateFlag(elements.rightFlag, data.RightNat);

    }

    function updateCard(element, value) {
      element.textContent = value > 0 ? value : "";
      element.style.visibility = value > 0 ? "visible" : "hidden";
    }

    function updatePCard(element, value) {
      // 0 = no display, 1 = yellow, 2 = red, other = no display
      element.style.visibility = "hidden";
      element.classList.remove('smYellow', 'smRed');
      element.textContent = "P"; // Ensure P text is always present

      const numValue = parseInt(value);

      if (numValue === 1) {
        element.classList.add('smYellow');
        element.style.visibility = "visible";
      } else if (numValue === 2) {
        element.classList.add('smRed');
        element.style.visibility = "visible";
      }
    }

    function updateLight(element, state) {
      element.style.opacity = state === "1" ? "1" : "0.1";
      element.style.boxShadow = state === "1" ? "0 0 15px currentColor" : "none";
    }
    // Fullscreen functionality
    const fullscreenButton = document.getElementById('fullscreen-btn');
    let isFullscreen = false;

    fullscreenButton.addEventListener('click', toggleFullscreen);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isFullscreen) {
        exitFullscreen();
      }
    });

    function toggleFullscreen() {
      if (!isFullscreen) {
        enterFullscreen();
      } else {
        exitFullscreen();
      }
    }

    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.mozRequestFullScreen) { /* Firefox */
        elem.mozRequestFullScreen();
      } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { /* IE/Edge */
        elem.msRequestFullscreen();
      }
      isFullscreen = true;
      // Add resize handler
      window.addEventListener('resize', handleResize);
      // Apply frame if current piste requires one
      applyPisteFrame();
    }

    function exitFullscreen() {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.mozCancelFullScreen) { /* Firefox */
        document.mozCancelFullScreen();
      } else if (document.webkitExitFullscreen) { /* Chrome, Safari & Opera */
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) { /* IE/Edge */
        document.msExitFullscreen();
      }
      isFullscreen = false;
      // Remove resize handler
      window.removeEventListener('resize', handleResize);
      // Remove any frame classes when exiting fullscreen
      const container = document.querySelector('.scoring-container');
      if (container) {
        container.classList.remove('frame-red', 'frame-green', 'frame-yellow', 'frame-blue', 'frame-gold');
      }
    }

    // Compute and apply a thin coloured frame to the scoring container when in fullscreen.
    function applyPisteFrame() {
      const container = document.querySelector('.scoring-container');
      if (!container) return;
      // clear existing frame classes
      container.classList.remove('frame-red', 'frame-green', 'frame-yellow', 'frame-blue', 'frame-gold');
      if (!document.fullscreenElement) return; // only show frame in fullscreen
      const s = (displayedPiste || '').toLowerCase();
      if (!s) return;
      if (s.includes('podium')) container.classList.add('frame-gold');
      else if (s.includes('red')) container.classList.add('frame-red');
      else if (s.includes('green')) container.classList.add('frame-green');
      else if (s.includes('yellow')) container.classList.add('frame-yellow');
      else if (s.includes('blue')) container.classList.add('frame-blue');
    }

    // Keep frame state in sync with browser fullscreen changes
    document.addEventListener('fullscreenchange', applyPisteFrame);

    // Resize handler
    function handleResize() {
      const container = document.querySelector('.scoring-container');

      if (document.fullscreenElement) {
        container.style.width = '100vw';
        container.style.height = '100vh';
      } else {
        const aspectRatio = 16 / 9;
        const windowRatio = window.innerWidth / window.innerHeight;

        if (windowRatio > aspectRatio) {
          container.style.width = `${90 * aspectRatio * (window.innerHeight / window.innerWidth)}vw`;
          container.style.height = '90vh';
        } else {
          container.style.width = '90vw';
          container.style.height = `${90 / aspectRatio * (window.innerWidth / window.innerHeight)}vh`;
        }
      }
    }
    // Update the updateFlag function to:
    function updateFlag(flagElement, nocCode) {
      if (nocCode && nocCode.length === 3) {
        const newSrc = `/flags/${nocCode.toUpperCase()}.png`;
        // Force reload by checking if src changed
        if (flagElement.src !== newSrc) {
          flagElement.src = newSrc;
        }
        flagElement.style.display = 'block';
        flagElement.onerror = () => {
          flagElement.style.display = 'none';
          flagElement.src = '';
        };
      } else {
        flagElement.style.display = 'none';
        flagElement.src = '';
      }
    }

    function loadFencerPhotos() {
      if (!currentPiste) return;

      // Load left fencer photo
      loadPhoto('left', currentPiste);
      // Load right fencer photo
      loadPhoto('right', currentPiste);
    }

    function loadPhoto(position, pisteNumber) {
      const photoElement = position === 'left' ? elements.leftPhoto : elements.rightPhoto;
      const imgElement = position === 'left' ? elements.leftPhotoImg : elements.rightPhotoImg;

      // Try common image extensions
      const extensions = ['jpg', 'jpeg', 'png', 'gif'];
      let extensionIndex = 0;

      function tryNextExtension() {
        if (extensionIndex >= extensions.length) {
          // All extensions failed, hide photo
          photoElement.classList.remove('visible');
          return;
        }

        const ext = extensions[extensionIndex];
        const photoUrl = `/fencers/piste-${pisteNumber}/${position}.${ext}?t=${Date.now()}`;

        const testImg = new Image();
        testImg.onload = () => {
          imgElement.src = photoUrl;
          photoElement.classList.add('visible');
        };
        testImg.onerror = () => {
          extensionIndex++;
          tryNextExtension();
        };
        testImg.src = photoUrl;
      }

      tryNextExtension();
    }
    window.addEventListener('resize', handleResize);

    // Rest of the script remains the same as previous version
